<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<style>
/* slide container */

.auth-content{
transition:0.5s ease;
}

/* slide animation */

.slide-left{
transform:translateX(-50px);
opacity:0;
}

.slide-right{
transform:translateX(50px);
opacity:0;
}    
    /* initial state */

body{
opacity:0;
transform:translateY(20px);
transition:0.6s ease;
}

/* active state */

body.loaded{
opacity:1;
transform:translateY(0);
}

/* exit animation */

body.fade-out{
opacity:0;
transform:translateY(-20px);
}

.password-box{
position:relative;
}

#toggleEye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>

<link rel="stylesheet" href="login.css">
<link rel="icon" type="image/png" sizes="64x64" href="images/faviconn.png">
</head>

<body class="auth-page">
